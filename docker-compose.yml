# ═══════════════════════════════════════════════════════════════
# Control de Accesos — Docker Compose (MySQL)
# ═══════════════════════════════════════════════════════════════
#
#   docker compose up -d
#
# Acceso: http://localhost:8000
# ═══════════════════════════════════════════════════════════════

services:
  # ── MySQL ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: control-accesos-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: control_accesos
      MYSQL_USER: control_accesos
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 30

  # ── App (PHP + Apache) ──────────────────────────
  app:
    build: .
    container_name: control-accesos
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: control_accesos
      DB_USERNAME: control_accesos
      DB_PASSWORD: secret

volumes:
  mysql-data:
