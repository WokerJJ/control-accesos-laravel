# ═══════════════════════════════════════════════════════════════
# Control de Accesos — Docker Compose
# ═══════════════════════════════════════════════════════════════
#
#   docker compose up -d
#
# Acceso: http://localhost:8000
# ═══════════════════════════════════════════════════════════════

services:
  app:
    build: .
    container_name: control-accesos
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - db-data:/var/www/html/database
      - storage-data:/var/www/html/storage

volumes:
  db-data:
  storage-data:
